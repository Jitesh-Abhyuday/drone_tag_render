<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Device Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="glass-panel">
            <h1>IoT Tracker Dashboard</h1>
            <p>Real-time telemetry and hardware module inspector</p>
        </header>

        <main class="grid-layout">
            <section class="glass-panel section-devices">
                <h2>Device Fleet</h2>
                <p class="instruction-text">Click a Tracker ID to inspect its logs</p>
                <div class="table-wrapper">
                    <table id="devicesTable">
                        <thead>
                            <tr>
                                <th>Tracker ID</th>
                                <th>Registered At</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </section>

            <section class="glass-panel section-logs">
                <h2 id="logsHeader">Telemetry Logs</h2>
                <div class="table-wrapper" id="logsTableWrapper">
                    <table id="logsTable">
                        <thead>
                            <tr>
                                <th>Tracker ID</th>
                                <th>Latitude</th>
                                <th>Longitude</th>
                                <th>Altitude</th>
                                <th>Timestamp</th>
                                <th>Map Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                    <div id="logsPlaceholder" class="placeholder-text">
                        Select a device from the fleet to view its telemetry trail.
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
